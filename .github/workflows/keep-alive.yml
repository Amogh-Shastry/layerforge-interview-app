name: Keep Render service awake

# Render free-tier web services spin down after ~15 min of inactivity. This
# pings the health endpoint every ~10 minutes so the service stays warm.
# Update RENDER_URL if your service URL changes.
on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      RENDER_URL: https://interview-app-62cy.onrender.com
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging $RENDER_URL/api/health"
          # Generous timeout + retries to ride through a cold start (~30-60s).
          curl -fsS --max-time 90 --retry 4 --retry-delay 15 --retry-all-errors \
            "$RENDER_URL/api/health" || echo "Ping failed (service may be cold-starting); will retry next run."
